spring:
  application:
    name: credit-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://host.docker.internal:8888}
  cloud:
    config:
      discovery:
        enabled: ${SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED:false}
        service-id: config-server

resilience4j:
  circuitbreaker:
    instances:
      customerValidation:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always

credit:
  customer-service:
    base-url: ${CREDIT_CUSTOMER_SERVICE_BASE_URL:http://localhost:7002}

security:
  jwt:
    secret: ${JWT_SECRET:change_this_secret_in_real_env_min_32_chars}


logging:
  level:
    root: INFO
    com.nttdata: INFO
